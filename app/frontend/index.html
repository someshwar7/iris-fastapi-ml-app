<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Predictor</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <!-- Decorative background glow blobs -->
    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">
                <!-- Elegant flower icon svg -->
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a15 15 0 0 0-3 9 3 3 0 0 0 6 0 15 15 0 0 0-3-9z"></path>
                    <path d="M12 21a15 15 0 0 1-3-9 3 3 0 0 1 6 0 15 15 0 0 1-3 9z"></path>
                    <path d="M3 12a15 15 0 0 0 9-3 3 3 0 0 0 0 6 15 15 0 0 0-9-3z"></path>
                    <path d="M21 12a15 15 0 0 1-9-3 3 3 0 0 1 0 6 15 15 0 0 1 9-3z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
            <h1>Iris Flower Classifier</h1>
            <div class="subtitle">Enter botanical measurements to predict the Iris species</div>
        </div>

        <!-- Form Grid -->
        <div class="form-grid">
            <div class="form-group">
                <label for="sepalLength">Sepal Length (cm)</label>
                <div class="input-wrapper">
                    <input type="number" id="sepalLength" step="0.1" min="0" placeholder="e.g. 5.1" value="5.1">
                </div>
            </div>

            <div class="form-group">
                <label for="sepalWidth">Sepal Width (cm)</label>
                <div class="input-wrapper">
                    <input type="number" id="sepalWidth" step="0.1" min="0" placeholder="e.g. 3.5" value="3.5">
                </div>
            </div>

            <div class="form-group">
                <label for="petalLength">Petal Length (cm)</label>
                <div class="input-wrapper">
                    <input type="number" id="petalLength" step="0.1" min="0" placeholder="e.g. 1.4" value="1.4">
                </div>
            </div>

            <div class="form-group">
                <label for="petalWidth">Petal Width (cm)</label>
                <div class="input-wrapper">
                    <input type="number" id="petalWidth" step="0.1" min="0" placeholder="e.g. 0.2" value="0.2">
                </div>
            </div>
        </div>

        <!-- Predict Button -->
        <button id="predictBtn" onclick="predictFlower()">
            <span>Predict Species</span>
        </button>

        <!-- Prediction Result Container -->
        <div id="resultCard" class="result-card">
            <div id="result-title">Model Output</div>
            <div id="result-value">Ready for inputs</div>
        </div>
    </div>

    <script src="/frontend/script.js"></script>
</body>
</html>
